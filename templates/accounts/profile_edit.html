{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-4">Edit Profile</h1>
                <form method="post">
                    {% csrf_token %}
                    {% include "includes/form_fields.html" with form=form %}
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
